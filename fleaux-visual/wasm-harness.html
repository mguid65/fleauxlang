<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fleaux WASM Harness</title>
    <script>
      (function () {
        const scope = '%BASE_URL%';

        if (!window.isSecureContext || window.crossOriginIsolated || !('serviceWorker' in navigator)) {
          return;
        }

        window.addEventListener('load', function () {
          navigator.serviceWorker.register(scope + 'coi-serviceworker.js', { scope }).then(function (registration) {
            console.log('COI service worker registered.', registration.scope);

            if (registration.active && !navigator.serviceWorker.controller) {
              window.location.reload();
            }
          }).catch(function (error) {
            console.error('COI service worker registration failed.', error);
          });
        });
      })();
    </script>
  </head>
  <body>
    <main>
      <h1>Fleaux WASM Harness</h1>
      <pre id="status">loading</pre>
    </main>
    <script type="module" src="/src/test-harness/wasmHarness.ts"></script>
  </body>
</html>
