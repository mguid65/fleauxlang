<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fleaux-visual</title>
    <script>
      (function () {
        const scope = '%BASE_URL%';
        const serviceWorkerUrl = scope + 'coi-serviceworker.js';
        const reloadMarkerKey = 'fleaux:coi-reload-pending';

        if (!window.isSecureContext || window.crossOriginIsolated || !('serviceWorker' in navigator)) {
          if (window.crossOriginIsolated) {
            sessionStorage.removeItem(reloadMarkerKey);
          }
          return;
        }

        function reloadOnce() {
          if (sessionStorage.getItem(reloadMarkerKey) === '1') {
            return;
          }

          sessionStorage.setItem(reloadMarkerKey, '1');
          window.location.reload();
        }

        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (!window.crossOriginIsolated) {
            reloadOnce();
          }
        });

        navigator.serviceWorker.register(serviceWorkerUrl, { scope }).then(function (registration) {
          console.log('COI service worker registered.', registration.scope);

          if (registration.active && !navigator.serviceWorker.controller) {
            reloadOnce();
            return registration;
          }

          return navigator.serviceWorker.ready.then(function () {
            if (!window.crossOriginIsolated) {
              reloadOnce();
            }
            return registration;
          });
        }).catch(function (error) {
            console.error('COI service worker registration failed.', error);
          });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
